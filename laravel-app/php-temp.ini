; PHP Temp Directory Configuration
sys_temp_dir = /var/www/html/storage/framework/cache
upload_tmp_dir = /var/www/html/storage/framework/cache
session.save_path = /var/www/html/storage/framework/sessions

; Increase upload limits
upload_max_filesize = 500M
post_max_size = 500M
max_execution_time = 600
memory_limit = 512M
